<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. AI - 3D Medical Assistant</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Three.js for 3D Model -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="js/api.js"></script>
    <style>
        .typing-indicator {
            display: flex;
            gap: 4px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
    <script>
        // Dr. AI 3D Model Viewer with Chat Interface
        let scene, camera, renderer, model, raycaster, mouse, canvas, isHovered = false, chatOpen = false;

        function initDrAIModel() {
            console.log('🤖 Initializing Dr. AI 3D Model...');

            canvas = document.getElementById('dr-ai-canvas');
            if (!canvas) {
                console.error('Canvas not found');
                return;
            }

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a3a);

            // Camera positioned for optimal model viewing
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Raycaster for mouse interaction
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Event listeners
            canvas.addEventListener('click', onModelClick);
            canvas.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);

            // Start animation loop
            animate();

            console.log('✅ Dr. AI 3D Model initialized');

            // Load GLB model
            loadGLBModel();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (model) {
                // Gentle floating animation
                const time = Date.now() * 0.001;
                model.position.y = Math.sin(time * 0.5) * 0.05;

                // Hover scale effect
                if (isHovered) {
                    model.scale.setScalar(1.05);
                    canvas.style.cursor = 'pointer';
                } else {
                    model.scale.setScalar(1.0);
                    canvas.style.cursor = 'default';
                }
            }

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        function loadGLBModel() {
            console.log('Loading GLB model...');

            const loader = new THREE.GLTFLoader();
            const glbPath = 'models/medical-doctor-3d-model.glb';

            loader.load(
                glbPath,
                function (gltf) {
                    console.log('GLB model loaded successfully!');
                    model = gltf.scene;

                    // Scale and position
                    model.scale.setScalar(2.0);
                    model.position.set(0, 0, 0);
                    model.rotation.y = -Math.PI / 2; // Rotate to face forward

                    // Enable shadows and materials
                    model.traverse(function (child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                child.material.transparent = false;
                                child.material.opacity = 1.0;
                                if (child.material.color) {
                                    const hex = child.material.color.getHex();
                                    if (hex === 0x000000 || hex < 0x333333) {
                                        child.material.color.setHex(0xcccccc);
                                    }
                                }
                            }
                        }
                    });

                    scene.add(model);
                    console.log('GLB Model added to scene');

                    // Fit camera to model
                    const bbox = new THREE.Box3().setFromObject(model);
                    const size = bbox.getSize(new THREE.Vector3());
                    const center = bbox.getCenter(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const distance = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360));
                    camera.position.set(center.x, center.y, center.z + distance * 1.5);
                    camera.lookAt(center);

                    // Hide loading
                    const loading = document.getElementById('dr-ai-loading');
                    if (loading) loading.style.display = 'none';

                    console.log('3D model ready');
                },
                function (progress) {
                    const percent = progress.total > 0 ? Math.round((progress.loaded / progress.total * 100)) : 0;
                    console.log('Loading progress:', percent + '%');
                },
                function (error) {
                    console.error('GLB loading failed:', error);
                    showError('Failed to load 3D model.');
                }
            );
        }

        function onMouseMove(event) {
            const canvas = document.getElementById('dr-ai-canvas');
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            // Check hover
            if (model) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(model, true);
                isHovered = intersects.length > 0;

                // Show/hide tooltip
                let tooltip = document.getElementById('dr-ai-tooltip');
                if (!tooltip) {
                    tooltip = document.createElement('div');
                    tooltip.id = 'dr-ai-tooltip';
                    tooltip.style.cssText = `
                        position: fixed;
                        background: rgba(0,0,0,0.8);
                        color: white;
                        padding: 8px 12px;
                        border-radius: 4px;
                        font-size: 14px;
                        pointer-events: none;
                        border: 1px solid #00ffff;
                        box-shadow: 0 0 10px rgba(0,255,255,0.5);
                        z-index: 1000;
                        display: none;
                    `;
                    tooltip.textContent = 'Click to talk to Dr AI';
                    document.body.appendChild(tooltip);
                }

                if (isHovered && !chatOpen && !chatOpen) {
                    tooltip.style.display = 'block';
                    tooltip.style.left = (event.clientX + 10) + 'px';
                    tooltip.style.top = (event.clientY - 10) + 'px';
                } else {
                    tooltip.style.display = 'none';
                }
            }
        }

        function onModelClick(event) {
            if (!model || chatOpen) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(model, true);

            if (intersects.length > 0) {
                console.log('🤖 Model clicked! Opening chat');
                openChat();
            } else {
                console.log('Click missed model');
            }
        }

        function openChat() {
            chatOpen = true;
            const canvas = document.getElementById('dr-ai-canvas');
            canvas.style.display = 'none'; // Hide the 3D model

            // Create full-screen chat overlay
            let chatPanel = document.getElementById('dr-ai-chat-panel');
            if (!chatPanel) {
                chatPanel = document.createElement('div');
                chatPanel.id = 'dr-ai-chat-panel';
                chatPanel.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                    display: flex;
                    flex-direction: column;
                    z-index: 1000;
                    padding: 20px;
                `;

                const header = document.createElement('div');
                header.style.cssText = `
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 20px;
                    padding-bottom: 10px;
                    border-bottom: 1px solid rgba(255,255,255,0.1);
                `;

                const titleContainer = document.createElement('div');
                titleContainer.style.cssText = `
                    display: flex;
                    align-items: center;
                    gap: 12px;
                `;

                const avatar = document.createElement('div');
                avatar.style.cssText = `
                    width: 50px;
                    height: 50px;
                    border-radius: 50%;
                    background: linear-gradient(135deg, #007bff, #0056b3);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                `;
                const avatarIcon = document.createElement('i');
                avatarIcon.className = 'fas fa-robot';
                avatarIcon.style.cssText = 'color: white; font-size: 20px;';
                avatar.appendChild(avatarIcon);

                const title = document.createElement('h2');
                title.textContent = 'Dr. AI Medical Assistant';
                title.style.cssText = `
                    margin: 0;
                    color: white;
                    font-size: 1.5rem;
                `;

                titleContainer.appendChild(avatar);
                titleContainer.appendChild(title);

                const closeBtn = document.createElement('button');
                closeBtn.textContent = '×';
                closeBtn.style.cssText = `
                    background: none;
                    border: none;
                    color: white;
                    font-size: 24px;
                    cursor: pointer;
                    padding: 8px;
                    border-radius: 50%;
                    transition: background 0.3s;
                `;
                closeBtn.onmouseover = () => closeBtn.style.background = 'rgba(255,255,255,0.1)';
                closeBtn.onmouseout = () => closeBtn.style.background = 'none';
                closeBtn.onclick = closeChat;

                header.appendChild(titleContainer);
                header.appendChild(closeBtn);

                const messages = document.createElement('div');
                messages.id = 'dr-ai-messages';
                messages.style.cssText = `
                    flex: 1;
                    overflow-y: auto;
                    padding: 20px;
                    background: rgba(255,255,255,0.05);
                    border-radius: 12px;
                    margin-bottom: 20px;
                `;

                const inputContainer = document.createElement('div');
                inputContainer.style.cssText = `
                    display: flex;
                    gap: 12px;
                    align-items: center;
                `;

                const input = document.createElement('input');
                input.id = 'dr-ai-input';
                input.type = 'text';
                input.placeholder = 'Ask Dr. AI about your health...';
                input.style.cssText = `
                    flex: 1;
                    padding: 12px 16px;
                    border: 1px solid rgba(255,255,255,0.2);
                    border-radius: 25px;
                    background: rgba(255,255,255,0.1);
                    color: white;
                    outline: none;
                    font-size: 16px;
                `;
                input.onkeypress = function(e) {
                    if (e.key === 'Enter') sendMessage();
                };

                const sendBtn = document.createElement('button');
                sendBtn.textContent = 'Send';
                sendBtn.id = 'dr-ai-send-btn';
                sendBtn.style.cssText = `
                    padding: 12px 24px;
                    border: none;
                    border-radius: 25px;
                    background: linear-gradient(135deg, #007bff, #0056b3);
                    color: white;
                    cursor: pointer;
                    font-size: 16px;
                    font-weight: 500;
                    transition: transform 0.2s;
                `;
                sendBtn.onmouseover = () => sendBtn.style.transform = 'scale(1.05)';
                sendBtn.onmouseout = () => sendBtn.style.transform = 'scale(1)';
                sendBtn.onclick = sendMessage;

                inputContainer.appendChild(input);
                inputContainer.appendChild(sendBtn);

                chatPanel.appendChild(header);
                chatPanel.appendChild(messages);
                chatPanel.appendChild(inputContainer);

                document.body.appendChild(chatPanel);

                // Add initial message
                addMessage('Hello! I\'m Dr. AI, your health monitoring assistant. How can I help you today?', 'ai');
            }

            chatPanel.style.display = 'flex';
        }

        function closeChat() {
            chatOpen = false;
            const canvas = document.getElementById('dr-ai-canvas');
            canvas.style.display = 'block';
            renderer.setSize(window.innerWidth, window.innerHeight);

            const chatPanel = document.getElementById('dr-ai-chat-panel');
            if (chatPanel) chatPanel.style.display = 'none';
        }

        function sendMessage() {
            const input = document.getElementById('dr-ai-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            // Show typing
            showTyping(true);

            // Send to API
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => {
                addMessage(data.response || 'I\'m sorry, I couldn\'t process your message.', 'ai');
            })
            .catch(error => {
                console.error('Chat error:', error);
                addMessage('Sorry, I\'m having trouble connecting. Please try again.', 'ai');
            })
            .finally(() => {
                showTyping(false);
            });
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('dr-ai-messages');
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = `
                display: flex;
                margin-bottom: 12px;
                justify-content: ${sender === 'user' ? 'flex-end' : 'flex-start'};
            `;

            if (sender === 'ai') {
                const avatar = document.createElement('div');
                avatar.style.cssText = `
                    width: 32px;
                    height: 32px;
                    border-radius: 50%;
                    background: #007bff;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    margin-right: 8px;
                    flex-shrink: 0;
                `;
                const icon = document.createElement('i');
                icon.className = 'fas fa-robot';
                icon.style.cssText = 'color: white; font-size: 14px;';
                avatar.appendChild(icon);
                messageDiv.appendChild(avatar);
            }

            const bubble = document.createElement('div');
            bubble.style.cssText = `
                max-width: 70%;
                padding: 8px 12px;
                border-radius: 12px;
                background: ${sender === 'user' ? '#007bff' : 'rgba(255,255,255,0.1)'};
                color: white;
            `;
            bubble.textContent = text;

            messageDiv.appendChild(bubble);
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping(show) {
            const messages = document.getElementById('dr-ai-messages');
            let typingDiv = document.getElementById('dr-ai-typing');

            if (show) {
                if (!typingDiv) {
                    typingDiv = document.createElement('div');
                    typingDiv.id = 'dr-ai-typing';
                    typingDiv.style.cssText = `
                        display: flex;
                        margin-bottom: 12px;
                    `;

                    const avatar = document.createElement('div');
                    avatar.style.cssText = `
                        width: 32px;
                        height: 32px;
                        border-radius: 50%;
                        background: #007bff;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        margin-right: 8px;
                        flex-shrink: 0;
                    `;
                    const icon = document.createElement('i');
                    icon.className = 'fas fa-robot';
                    icon.style.cssText = 'color: white; font-size: 14px;';
                    avatar.appendChild(icon);

                    const bubble = document.createElement('div');
                    bubble.style.cssText = `
                        padding: 8px 12px;
                        border-radius: 12px;
                        background: rgba(255,255,255,0.1);
                        color: white;
                        display: flex;
                        align-items: center;
                    `;

                    const indicator = document.createElement('div');
                    indicator.className = 'typing-indicator';
                    indicator.style.cssText = `
                        display: flex;
                        gap: 4px;
                    `;

                    for (let i = 0; i < 3; i++) {
                        const dot = document.createElement('span');
                        dot.style.cssText = `
                            width: 6px;
                            height: 6px;
                            border-radius: 50%;
                            background: white;
                            animation: typing 1.4s infinite ease-in-out;
                        `;
                        dot.style.animationDelay = `-${0.32 - i * 0.16}s`;
                        indicator.appendChild(dot);
                    }

                    bubble.appendChild(indicator);
                    typingDiv.appendChild(avatar);
                    typingDiv.appendChild(bubble);
                    messages.appendChild(typingDiv);
                }
                typingDiv.style.display = 'flex';
            } else if (typingDiv) {
                typingDiv.style.display = 'none';
            }
        }

        function onWindowResize() {
            const canvas = document.getElementById('dr-ai-canvas');
            if (canvas && camera && renderer) {
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            }
        }

        function showError(message) {
            const loading = document.getElementById('dr-ai-loading');
            if (loading) {
                loading.innerHTML = `<i class="fas fa-exclamation-triangle"></i><div>Error: ${message}</div>`;
            }
            console.error(message);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Dr. AI 3D Model page loaded');
            initDrAIModel();
        });
    </script>
</head>
<body>
    <div id="dr-ai-container">
        <!-- Loading Indicator -->
        <div id="dr-ai-loading">
            <i class="fas fa-cog"></i>
            <div>Loading 3D Model...</div>
        </div>

        <!-- 3D Canvas -->
        <canvas id="dr-ai-canvas"></canvas>
    </div>
</body>
</html>
