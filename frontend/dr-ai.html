<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. AI - 3D Medical Assistant</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@react-three/fiber@8.15.11/dist/react-three-fiber.js"></script>
    <script src="https://unpkg.com/@react-three/drei@9.88.13/dist/index.js"></script>

    <script src="js/api.js"></script>
    <script>
        // Dr. AI React Component - Inline Implementation
        const { useState, useRef, useEffect } = React;
        const { Canvas, useFrame, useThree } = ReactThreeFiber;
        const { useGLTF, Html } = ReactThreeDrei;

        // Preload the GLB model
        useGLTF.preload('/models/medical-doctor-3d-model.glb');

        // 3D Model Component
        function DrAIModel({ onClick }) {
            const { scene } = useGLTF('/models/medical-doctor-3d-model.glb');
            const modelRef = React.useRef();
            const [hovered, setHovered] = React.useState(false);

            // Hover animation
            useFrame((state, delta) => {
                if (modelRef.current) {
                    // Gentle floating animation
                    modelRef.current.position.y = Math.sin(state.clock.elapsedTime * 0.5) * 0.05;
                    // Subtle hover effect
                    if (hovered) {
                        modelRef.current.scale.setScalar(1.05);
                    } else {
                        modelRef.current.scale.setScalar(1.0);
                    }
                }
            });

            // Fit camera to model
            const { camera } = useThree();
            React.useEffect(() => {
                if (scene) {
                    const box = new THREE.Box3().setFromObject(scene);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const distance = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360));
                    camera.position.set(center.x, center.y, center.z + distance * 1.5);
                    camera.lookAt(center);
                }
            }, [scene, camera]);

            return React.createElement('group', {
                ref: modelRef,
                onClick: onClick,
                onPointerOver: () => setHovered(true),
                onPointerOut: () => setHovered(false),
                style: { cursor: hovered ? 'pointer' : 'default' }
            }, [
                React.createElement('primitive', { object: scene }),
                hovered && React.createElement(Html, { position: [0, 2, 0] }, 
                    React.createElement('div', {
                        style: {
                            background: 'rgba(0,0,0,0.8)',
                            color: 'white',
                            padding: '8px 12px',
                            borderRadius: '4px',
                            fontSize: '14px',
                            pointerEvents: 'none',
                            border: '1px solid #00ffff',
                            boxShadow: '0 0 10px rgba(0,255,255,0.5)'
                        }
                    }, 'Click to talk to Dr AI')
                )
            ]);
        }

        // Loading Fallback
        function LoadingFallback() {
            return React.createElement(Html, { center: true }, 
                React.createElement('div', { 
                    style: { color: 'white', fontSize: '18px' } 
                }, [
                    React.createElement('i', { 
                        className: 'fas fa-spinner fa-spin', 
                        style: { marginRight: '8px' } 
                    }),
                    'Loading 3D Model...'
                ])
            );
        }

        // Chat Panel Component
        function ChatPanel({ isOpen, onClose, messages, onSendMessage, isTyping }) {
            const [input, setInput] = React.useState('');
            const messagesEndRef = React.useRef();

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            React.useEffect(scrollToBottom, [messages]);

            const handleSend = () => {
                if (input.trim()) {
                    onSendMessage(input.trim());
                    setInput('');
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    handleSend();
                }
            };

            if (!isOpen) return null;

            return React.createElement('div', {
                style: {
                    position: 'fixed',
                    bottom: 0,
                    left: 0,
                    right: 0,
                    height: '45%',
                    background: 'rgba(0,0,0,0.95)',
                    borderTop: '1px solid rgba(255,255,255,0.2)',
                    display: 'flex',
                    flexDirection: 'column',
                    zIndex: 1000
                }
            }, [
                React.createElement('div', {
                    style: {
                        padding: '16px',
                        borderBottom: '1px solid rgba(255,255,255,0.1)',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center'
                    }
                }, [
                    React.createElement('h3', { style: { margin: 0, color: 'white' } }, 'Dr AI'),
                    React.createElement('button', {
                        onClick: onClose,
                        style: {
                            background: 'none',
                            border: 'none',
                            color: 'white',
                            fontSize: '20px',
                            cursor: 'pointer'
                        }
                    }, '×')
                ]),

                React.createElement('div', {
                    style: {
                        flex: 1,
                        overflowY: 'auto',
                        padding: '16px'
                    }
                }, [
                    ...messages.map((msg, index) => 
                        React.createElement('div', {
                            key: index,
                            style: {
                                display: 'flex',
                                marginBottom: '12px',
                                justifyContent: msg.sender === 'user' ? 'flex-end' : 'flex-start'
                            }
                        }, [
                            msg.sender === 'ai' && React.createElement('div', {
                                style: {
                                    width: '32px',
                                    height: '32px',
                                    borderRadius: '50%',
                                    background: '#007bff',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    marginRight: '8px',
                                    flexShrink: 0
                                }
                            }, React.createElement('i', { className: 'fas fa-robot', style: { color: 'white', fontSize: '14px' } })),
                            React.createElement('div', {
                                style: {
                                    maxWidth: '70%',
                                    padding: '8px 12px',
                                    borderRadius: '12px',
                                    background: msg.sender === 'user' ? '#007bff' : 'rgba(255,255,255,0.1)',
                                    color: 'white'
                                }
                            }, msg.text)
                        ])
                    ),
                    isTyping && React.createElement('div', { style: { display: 'flex', marginBottom: '12px' } }, [
                        React.createElement('div', {
                            style: {
                                width: '32px',
                                height: '32px',
                                borderRadius: '50%',
                                background: '#007bff',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                marginRight: '8px',
                                flexShrink: 0
                            }
                        }, React.createElement('i', { className: 'fas fa-robot', style: { color: 'white', fontSize: '14px' } })),
                        React.createElement('div', {
                            style: {
                                padding: '8px 12px',
                                borderRadius: '12px',
                                background: 'rgba(255,255,255,0.1)',
                                color: 'white',
                                display: 'flex',
                                alignItems: 'center'
                            }
                        }, React.createElement('div', { className: 'typing-indicator' }, [
                            React.createElement('span', null),
                            React.createElement('span', null),
                            React.createElement('span', null)
                        ]))
                    ]),
                    React.createElement('div', { ref: messagesEndRef })
                ]),

                React.createElement('div', {
                    style: {
                        padding: '16px',
                        borderTop: '1px solid rgba(255,255,255,0.1)',
                        display: 'flex',
                        gap: '8px'
                    }
                }, [
                    React.createElement('input', {
                        type: 'text',
                        value: input,
                        onChange: (e) => setInput(e.target.value),
                        onKeyPress: handleKeyPress,
                        placeholder: 'Ask Dr. AI about your health...',
                        style: {
                            flex: 1,
                            padding: '8px 12px',
                            border: '1px solid rgba(255,255,255,0.2)',
                            borderRadius: '20px',
                            background: 'rgba(255,255,255,0.1)',
                            color: 'white',
                            outline: 'none'
                        }
                    }),
                    React.createElement('button', {
                        onClick: handleSend,
                        disabled: !input.trim(),
                        style: {
                            padding: '8px 16px',
                            border: 'none',
                            borderRadius: '20px',
                            background: input.trim() ? '#007bff' : 'rgba(255,255,255,0.2)',
                            color: 'white',
                            cursor: input.trim() ? 'pointer' : 'not-allowed'
                        }
                    }, 'Send')
                ])
            ]);
        }

        // Main DrAI Component
        function DrAI() {
            const [chatOpen, setChatOpen] = React.useState(false);
            const [messages, setMessages] = React.useState([
                { sender: 'ai', text: 'Hello! I\'m Dr. AI, your health monitoring assistant. How can I help you today?' }
            ]);
            const [isTyping, setIsTyping] = React.useState(false);

            const handleModelClick = () => {
                setChatOpen(true);
            };

            const handleSendMessage = async (message) => {
                setMessages(prev => [...prev, { sender: 'user', text: message }]);
                setIsTyping(true);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { sender: 'ai', text: data.response || 'I\'m sorry, I couldn\'t process your message.' }]);
                } catch (error) {
                    console.error('Chat error:', error);
                    setMessages(prev => [...prev, { sender: 'ai', text: 'Sorry, I\'m having trouble connecting. Please try again.' }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return React.createElement('div', { style: { width: '100vw', height: '100vh', background: '#0a0a0a' } }, [
                React.createElement('div', { style: { width: '100%', height: chatOpen ? '55%' : '100%' } }, 
                    React.createElement(Canvas, { camera: { position: [0, 0, 5], fov: 75 } }, [
                        React.createElement(React.Suspense, { fallback: React.createElement(LoadingFallback) }, [
                            React.createElement(DrAIModel, { onClick: handleModelClick }),
                            React.createElement('ambientLight', { intensity: 0.5 }),
                            React.createElement('directionalLight', { position: [10, 10, 5], intensity: 1 })
                        ])
                    ])
                ),

                React.createElement(ChatPanel, {
                    isOpen: chatOpen,
                    onClose: () => setChatOpen(false),
                    messages: messages,
                    onSendMessage: handleSendMessage,
                    isTyping: isTyping
                }),

                React.createElement('style', null, `
                    .typing-indicator {
                        display: flex;
                        gap: 4px;
                    }
                    .typing-indicator span {
                        width: 6px;
                        height: 6px;
                        border-radius: 50%;
                        background: white;
                        animation: typing 1.4s infinite ease-in-out;
                    }
                    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
                    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
                    @keyframes typing {
                        0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
                        40% { transform: scale(1); opacity: 1; }
                    }
                `)
            ]);
        }

        // Render the app
        const container = document.getElementById('dr-ai-root');
        if (container) {
            const root = ReactDOM.createRoot(container);
            root.render(React.createElement(DrAI));
        }
    </script>
</head>
<body>
    <div id="dr-ai-root"></div>
</body>
</html>
