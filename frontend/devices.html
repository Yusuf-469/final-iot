<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices - HealthMonitor v2.3</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">
                    <i class="fas fa-heartbeat heartbeat-icon"></i>
                    <span class="logo-text">HealthMonitor</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-section-title">Main</span>
                    <a href="dashboard.html" class="nav-item">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="patients.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Patients</span>
                    </a>
                    <a href="devices.html" class="nav-item active">
                        <i class="fas fa-microchip"></i>
                        <span>Devices</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <span class="nav-section-title">Monitoring</span>
                    <a href="alerts.html" class="nav-item">
                        <i class="fas fa-bell"></i>
                        <span>Alerts</span>
                        <span class="badge alert-badge">3</span>
                    </a>
                    <a href="analytics.html" class="nav-item">
                        <i class="fas fa-chart-line"></i>
                        <span>Analytics</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <span class="nav-section-title">System</span>
                    <a href="settings.html" class="nav-item">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="page-title">
                        <h1>Devices</h1>
                    </div>
                </div>
                
                <div class="header-right">
                    <button class="btn btn-primary" onclick="showAddDeviceModal()">
                        <i class="fas fa-plus"></i> Add Device
                    </button>
                </div>
            </header>

            <div class="dashboard-content">
<!-- Device Stats -->
                <section class="stats-section reveal-scroll">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-microchip"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="total-devices">0</span>
                            <span class="stat-label">Total Devices</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon online">
                            <i class="fas fa-circle"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="online-devices">0</span>
                            <span class="stat-label">Online</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon warning">
                            <i class="fas fa-battery-quarter"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="low-battery-devices">0</span>
                            <span class="stat-label">Low Battery</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="avg-battery">0%</span>
                            <span class="stat-label">Avg Battery</span>
                        </div>
                    </div>
                </section>

                <!-- Devices Grid -->
                <section class="devices-section reveal-scroll">
                    <div class="section-header">
                        <h3><i class="fas fa-server"></i> Connected Devices</h3>
                    </div>
                    <div class="devices-full-grid" id="devices-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Device</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="js/page-scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadDevicesPage();
        });

        async function loadDevicesPage() {
            try {
                const response = await fetch('/api/devices');
                let devices = [];

                if (response.ok) {
                    const data = await response.json();
                    devices = data.devices || [];
                } else {
                    console.warn('Failed to load devices from API, showing empty state');
                }

                // Update stats
                updateDeviceStats(devices);

                const grid = document.getElementById('devices-grid');

                if (devices.length === 0) {
                    grid.innerHTML = '<div class="no-data">No devices found. Add devices to get started.</div>';
                    return;
                }

                grid.innerHTML = devices.map(d => {
                    const status = d.status || 'offline';
                    const battery = d.power?.batteryLevel || d.battery || 0;
                    const signalStrength = d.connectivity?.signalStrength || d.signal || 'Unknown';
                    const lastActive = d.lastSeen ? new Date(d.lastSeen).toLocaleString() : (d.lastActive || 'Never');

                    return `
                        <div class="device-full-card ${status}">
                            <div class="device-status-badge ${status}">${status}</div>
                            <div class="device-header">
                                <div class="device-icon-large">
                                    <i class="fas fa-microchip"></i>
                                </div>
                                <div class="device-info">
                                    <h4>${d.deviceId || d.id || 'Unknown'}</h4>
                                    <p>${d.patientName || d.name || 'Unassigned'}</p>
                                </div>
                            </div>
                            <div class="device-metrics">
                                <div class="device-metric">
                                    <i class="fas fa-battery-${battery > 75 ? 'full' : battery > 50 ? 'half' : battery > 25 ? 'quarter' : 'empty'}"></i>
                                    <span>${battery}%</span>
                                </div>
                                <div class="device-metric">
                                    <i class="fas fa-wifi"></i>
                                    <span>${signalStrength}</span>
                                </div>
                                <div class="device-metric">
                                    <i class="fas fa-clock"></i>
                                    <span>${lastActive}</span>
                                </div>
                            </div>
                            <div class="device-actions-row">
                                <button class="btn btn-sm btn-secondary"><i class="fas fa-cog"></i> Config</button>
                                <button class="btn btn-sm btn-outline"><i class="fas fa-history"></i> History</button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading devices:', error);
                const grid = document.getElementById('devices-grid');
                grid.innerHTML = '<div class="no-data">Error loading devices. Please try again.</div>';
            }
        }

        function updateDeviceStats(devices) {
            const totalDevices = devices.length;
            const onlineDevices = devices.filter(d => d.status === 'online').length;
            const lowBatteryDevices = devices.filter(d => (d.power?.batteryLevel || d.battery || 0) < 20).length;
            const avgBattery = devices.length > 0 ?
                Math.round(devices.reduce((sum, d) => sum + (d.power?.batteryLevel || d.battery || 0), 0) / devices.length) : 0;

            // Update stats cards using IDs
            document.getElementById('total-devices').textContent = totalDevices;
            document.getElementById('online-devices').textContent = onlineDevices;
            document.getElementById('low-battery-devices').textContent = lowBatteryDevices;
            document.getElementById('avg-battery').textContent = `${avgBattery}%`;
        }

        function showAddDeviceModal() {
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="addDevice(event)">
                    <div class="form-group">
                        <label>Device ID</label>
                        <input type="text" id="device-id" required placeholder="e.g., ESP32-005">
                    </div>
                    <div class="form-group">
                        <label>Assign to Patient</label>
                        <select id="device-patient" required>
                            <option value="">Select Patient</option>
                            <!-- Patient options will be loaded dynamically -->
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Add Device</button>
                </form>
            `;
            document.getElementById('modal-overlay').classList.add('active');
        }

        function addDevice(e) {
            e.preventDefault();
            closeModal();
            showToast('Device added successfully!', 'success');
        }

        // Load patients for device assignment
        async function loadPatientsForDeviceAssignment() {
            try {
                const response = await fetch('/api/patients');
                const patients = await response.json();

                const patientSelect = document.getElementById('device-patient');
                // Clear existing options except the first one
                patientSelect.innerHTML = '<option value="">Select Patient</option>';

                // Add patients from API
                patients.forEach(patient => {
                    const option = document.createElement('option');
                    option.value = patient.id;
                    option.textContent = patient.name;
                    patientSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading patients:', error);
                // Fallback to show a message
                const patientSelect = document.getElementById('device-patient');
                patientSelect.innerHTML = '<option value="">Unable to load patients</option>';
            }
        }

        // Load patients when modal is shown
        function showAddDeviceModal() {
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="addDevice(event)">
                    <div class="form-group">
                        <label>Device ID</label>
                        <input type="text" id="device-id" required placeholder="e.g., ESP32-005">
                    </div>
                    <div class="form-group">
                        <label>Assign to Patient</label>
                        <select id="device-patient" required>
                            <option value="">Loading patients...</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Add Device</button>
                </form>
            `;
            document.getElementById('modal-overlay').classList.add('active');

            // Load patients after modal is shown
            loadPatientsForDeviceAssignment();
        }

        // Load patients for device assignment
        async function loadPatientsForDeviceAssignment() {
            try {
                const response = await fetch('/api/patients');
                const patients = await response.json();

                const patientSelect = document.getElementById('device-patient');
                // Clear existing options except the first one
                patientSelect.innerHTML = '<option value="">Select Patient</option>';

                // Add patients from API
                patients.forEach(patient => {
                    const option = document.createElement('option');
                    option.value = patient.id;
                    option.textContent = patient.name;
                    patientSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading patients:', error);
                // Fallback to show a message
                const patientSelect = document.getElementById('device-patient');
                patientSelect.innerHTML = '<option value="">Unable to load patients</option>';
            }
        }

        // Load devices for patient assignment (for patients.html cross-reference)
        async function loadDevicesForPatientAssignment() {
            try {
                const response = await fetch('/api/devices');
                const devices = await response.json();

                const deviceSelect = document.getElementById('patient-device');
                // Clear existing options except the first one
                deviceSelect.innerHTML = '<option value="">Select Device</option>';

                // Add devices from API
                devices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.id || device.deviceId;
                    option.textContent = device.deviceId || device.id || 'Unknown Device';
                    deviceSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading devices:', error);
                // Fallback to show a message
                const deviceSelect = document.getElementById('patient-device');
                deviceSelect.innerHTML = '<option value="">Unable to load devices</option>';
            }
        }

        // Load devices when modal is shown (for patients.html cross-reference)
        function showAddPatientModal() {
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="addPatient(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="patient-name" required placeholder="Enter patient name">
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="patient-age" required placeholder="Enter age">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="patient-phone" required placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label>Device ID</label>
                        <select id="patient-device" required>
                            <option value="">Loading devices...</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Add Patient</button>
                </form>
            `;
            document.getElementById('modal-overlay').classList.add('active');

            // Load devices after modal is shown
            loadDevicesForPatientAssignment();
        }

        async function addPatient(e) {
            e.preventDefault();

            const nameInput = document.getElementById('patient-name');
            const ageInput = document.getElementById('patient-age');
            const phoneInput = document.getElementById('patient-phone');
            const deviceSelect = document.getElementById('patient-device');

            const name = nameInput.value.trim();
            const age = parseInt(ageInput.value);
            const phone = phoneInput.value.trim();
            const deviceId = deviceSelect.value;

            if (!name || !age || !deviceId) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            try {
                const response = await fetch('/api/patients', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name,
                        age,
                        phone,
                        deviceId
                    }),
                });

                if (response.ok) {
                    showToast('Patient added successfully!', 'success');
                    document.getElementById('modal-overlay').classList.remove('active');
                    loadPatients(); // Refresh the patient list
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Failed to add patient', 'error');
                }
            } catch (error) {
                console.error('Error adding patient:', error);
                showToast('Error adding patient', 'error');
            }
        }

    <div class="toast-container" id="toast-container"></div>
    </script>
</body>
</html>
